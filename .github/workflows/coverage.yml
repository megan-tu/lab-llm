name: Coverage

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: [3.11]

    steps:
      # Step 1: Checkout your repository
      - uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest coverage codecov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Run tests with coverage
      - name: Run doctests with coverage
        run: |
          coverage run -m pytest chat.py --doctest-modules
          coverage report -m
          coverage xml  # generates coverage.xml for Codecov

      # Step 5: Upload coverage to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: coverage.xml
          fail_ci_if_error: true
